<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля — Альбом коллекционера</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>🔐 Восстановление пароля</h2>
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            <div id="successMsg" class="success-message" style="display: none;"></div>
            <form id="forgotForm">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <button type="submit" class="btn-primary">Отправить ссылку для сброса</button>
            </form>
            <p class="auth-link">
                <a href="login.html">← Вернуться к входу</a>
            </p>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            try {
                errorDiv.style.display = 'none';
                const result = await requestPasswordReset(email);
                successDiv.textContent = result.message || '📧 Ссылка для сброса пароля отправлена на ваш email.';
                successDiv.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 5000);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 5000);
            }
        });
    </script>
</body>
</html>
