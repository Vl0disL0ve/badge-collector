<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Альбом коллекционера</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📛 Альбом коллекционера</h1>
            <nav>
                <a href="index.html">📚 Каталог</a>
                <a href="categories.html">📁 Коллекция</a>
                <a href="add-badge.html">➕ Добавить значок</a>
                <a href="profile.html" class="active">👤 Профиль</a>
                <a href="#" id="logoutBtn">🚪 Выйти</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="form-container">
            <h2>👤 Мой профиль</h2>
            
            <div id="stats" class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="statsCategories">—</div><div class="stat-label">Категорий</div></div>
                <div class="stat-card"><div class="stat-number" id="statsSets">—</div><div class="stat-label">Наборов</div></div>
                <div class="stat-card"><div class="stat-number" id="statsBadges">—</div><div class="stat-label">Значков</div></div>
                <div class="stat-card"><div class="stat-number" id="statsTags">—</div><div class="stat-label">Тегов</div></div>
            </div>
            
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="userEmail" readonly disabled>
            </div>
            
            <div class="form-group">
                <label>📅 Дата регистрации</label>
                <input type="text" id="userCreatedAt" readonly disabled>
            </div>
            
            <hr style="margin: 2rem 0;">
            
            <h3>🤖 Привязка Telegram</h3>
            <div id="telegramStatus" style="margin-bottom: 1rem;"></div>
            <div class="form-row">
                <div class="form-group">
                    <label>Telegram ID</label>
                    <input type="text" id="telegramId" readonly disabled>
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button id="generateCodeBtn" class="btn-primary">🔗 Привязать Telegram</button>
                </div>
            </div>
            <div id="telegramCode" style="display: none; margin-top: 1rem; padding: 1rem; background: #f3f4f6; border-radius: 8px; text-align: center;">
                <p>Ваш код для привязки:</p>
                <code id="telegramCodeValue" style="font-size: 2rem; font-weight: bold;"></code>
                <p>Введите этот код в Telegram-боте. Код действителен 15 минут.</p>
            </div>
            
            <hr style="margin: 2rem 0;">
            
            <h3>📤 Экспорт коллекции</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Выберите набор для экспорта</label>
                    <select id="exportSetId">
                        <option value="">Все значки</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button id="exportBtn" class="btn-primary">📄 Экспорт в PDF</button>
                </div>
            </div>
            
            <div id="adminPanel" style="display: none; margin-top: 2rem;">
                <hr style="margin: 2rem 0;">
                <h3>👑 Админ-панель</h3>
                <button id="adminBtn" class="btn-primary">🔧 Перейти в админ-панель</button>
            </div>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        async function loadProfile() {
            try {
                const profile = await getProfile();
                document.getElementById('userEmail').value = profile.email;
                document.getElementById('userCreatedAt').value = new Date(profile.created_at).toLocaleDateString('ru-RU');
                document.getElementById('telegramId').value = profile.telegram_id || 'Не привязан';
                document.getElementById('telegramStatus').innerHTML = profile.telegram_id 
                    ? '<span style="color: green;">✅ Telegram привязан</span>' 
                    : '<span style="color: orange;">⚠️ Telegram не привязан</span>';
                if (profile.is_admin) document.getElementById('adminPanel').style.display = 'block';
            } catch (error) { console.error('Ошибка загрузки профиля:', error); }
        }
        
        async function loadStats() {
            try {
                const categories = await getCategories();
                const sets = await getSets();
                const badgesData = await getBadges({ limit: 1000 });
                const tags = await getTags();
                document.getElementById('statsCategories').textContent = categories.length;
                document.getElementById('statsSets').textContent = sets.length;
                document.getElementById('statsBadges').textContent = badgesData.total || 0;
                document.getElementById('statsTags').textContent = tags.length;
            } catch (error) { console.error('Ошибка статистики:', error); }
        }
        
        async function loadExportSets() {
            try {
                const sets = await getSets();
                const select = document.getElementById('exportSetId');
                select.innerHTML = '<option value="">📦 Все значки</option>';
                sets.forEach(set => {
                    const option = document.createElement('option');
                    option.value = set.id;
                    option.textContent = `${set.name} (${set.collected_count || 0}/${set.total_count})`;
                    select.appendChild(option);
                });
            } catch (error) { console.error('Ошибка загрузки наборов:', error); }
        }
        
        document.getElementById('generateCodeBtn').addEventListener('click', async () => {
            try {
                const result = await generateTelegramCode();
                document.getElementById('telegramCodeValue').textContent = result.code;
                document.getElementById('telegramCode').style.display = 'block';
                setTimeout(() => document.getElementById('telegramCode').style.display = 'none', 15000);
            } catch (error) { alert('Ошибка: ' + error.message); }
        });
        
        document.getElementById('exportBtn').addEventListener('click', async () => {
            const setId = document.getElementById('exportSetId').value;
            try {
                const result = await exportCollection(setId);
                if (result.file_url) window.open(`http://localhost:8000${result.file_url}`, '_blank');
            } catch (error) { alert('Ошибка экспорта: ' + error.message); }
        });
        
        document.getElementById('adminBtn')?.addEventListener('click', () => window.location.href = 'admin.html');
        
        checkAuth().then(() => { loadProfile(); loadStats(); loadExportSets(); });
    </script>
</body>
</html>
