<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать значок — Альбом коллекционера</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📛 Альбом коллекционера</h1>
            <nav>
                <a href="index.html">📚 Каталог</a>
                <a href="categories.html">📁 Коллекция</a>
                <a href="add-badge.html">➕ Добавить значок</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="#" id="logoutBtn">🚪 Выйти</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="form-container">
            <h2>✏️ Редактировать значок</h2>
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            <div id="successMsg" class="success-message" style="display: none;"></div>
            
            <form id="badgeForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="name" name="name" required maxlength="200">
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="description" name="description" rows="3"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Год выпуска</label>
                        <input type="number" id="year" name="year" min="1800" max="2026">
                    </div>
                    <div class="form-group">
                        <label>Материал</label>
                        <input type="text" id="material" name="material" maxlength="100">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Состояние</label>
                    <select id="condition" name="condition">
                        <option value="">Не указано</option>
                        <option value="excellent">Отличное</option>
                        <option value="good">Хорошее</option>
                        <option value="average">Среднее</option>
                        <option value="poor">Плохое</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Набор *</label>
                    <select id="set_id" name="set_id" required>
                        <option value="">Выберите набор</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Теги (через запятую)</label>
                    <input type="text" id="tags" name="tags" placeholder="спорт, олимпиада, металл">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Сохранить изменения</button>
                    <button type="button" class="btn-secondary" onclick="window.location.href=`badge-detail.html?id=${badgeId}`">Отмена</button>
                </div>
            </form>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const badgeId = urlParams.get('id');
        
        async function loadBadgeData() {
            if (!badgeId) { window.location.href = 'index.html'; return; }
            try {
                const badge = await getBadge(badgeId);
                document.getElementById('name').value = badge.name;
                document.getElementById('description').value = badge.description || '';
                document.getElementById('year').value = badge.year || '';
                document.getElementById('material').value = badge.material || '';
                document.getElementById('condition').value = badge.condition || '';
                if (badge.tags && badge.tags.length) document.getElementById('tags').value = badge.tags.join(', ');
                await loadSets();
                if (badge.set_id) document.getElementById('set_id').value = badge.set_id;
            } catch (error) { showError('Ошибка загрузки: ' + error.message); }
        }
        
        async function loadSets() {
            try {
                const sets = await getSets();
                const select = document.getElementById('set_id');
                select.innerHTML = '<option value="">Выберите набор</option>';
                sets.forEach(set => {
                    const option = document.createElement('option');
                    option.value = set.id;
                    option.textContent = `${set.name} (${set.collected_count || 0}/${set.total_count})`;
                    select.appendChild(option);
                });
            } catch (error) { showError('Не удалось загрузить наборы'); }
        }
        
        document.getElementById('badgeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            const description = document.getElementById('description').value;
            if (description) formData.append('description', description);
            const year = document.getElementById('year').value;
            if (year) formData.append('year', year);
            const material = document.getElementById('material').value;
            if (material) formData.append('material', material);
            const condition = document.getElementById('condition').value;
            if (condition) formData.append('condition', condition);
            const setId = document.getElementById('set_id').value;
            if (!setId) { showError('Выберите набор'); return; }
            formData.append('set_id', setId);
            const tags = document.getElementById('tags').value;
            if (tags) {
                const tagsArray = tags.split(',').map(t => t.trim()).filter(t => t);
                formData.append('tags', JSON.stringify(tagsArray));
            }
            try {
                await updateBadge(badgeId, formData);
                document.getElementById('successMsg').textContent = '✅ Значок обновлён! Перенаправление...';
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => window.location.href = `badge-detail.html?id=${badgeId}`, 1500);
            } catch (error) { showError(error.message); }
        });
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }
        
        checkAuth().then(loadBadgeData);
    </script>
</body>
</html>
