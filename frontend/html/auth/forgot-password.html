<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля — Альбом коллекционера</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>🔐 Восстановление пароля</h2>
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            <div id="successMsg" class="success-message" style="display: none;"></div>
            <form id="forgotForm">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <button type="submit" class="btn-primary">Отправить ссылку для сброса</button>
            </form>
            <p class="auth-link">
                <a href="login.html">← Вернуться к входу</a>
            </p>
        </div>
    </div>

    <script src="/js/core/utils.js"></script>
    <script src="/js/core/api.js"></script>
    <script>
        // Функция запроса сброса пароля (пока заглушка, добавим позже)
        async function requestPasswordReset(email) {
            // TODO: добавить эндпоинт в бэкенд
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve({ message: '📧 Ссылка для сброса пароля отправлена на ваш email.' });
                }, 500);
            });
        }
        
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            try {
                const result = await requestPasswordReset(email);
                showSuccess(result.message, 'successMsg');
                setTimeout(() => window.location.href = 'login.html', 5000);
            } catch (error) {
                showError(error.message);
            }
        });
    </script>
</body>
</html>
