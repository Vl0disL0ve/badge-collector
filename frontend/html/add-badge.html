<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить значок — Альбом коллекционера</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📛 Альбом коллекционера</h1>
            <nav>
                <a href="index.html">Коллекция</a>
                <a href="add-badge.html" class="active">➕ Добавить значок</a>
                <a href="#" id="logoutBtn">🚪 Выйти</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="form-container">
            <h2>Добавить значок</h2>
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            <div id="successMsg" class="success-message" style="display: none;"></div>
            
            <form id="badgeForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="description" name="description" rows="3"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Год выпуска</label>
                        <input type="number" id="year" name="year" min="1800" max="2026">
                    </div>
                    <div class="form-group">
                        <label>Материал</label>
                        <input type="text" id="material" name="material" placeholder="Металл, пластик...">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Состояние</label>
                    <select id="condition" name="condition">
                        <option value="">Не указано</option>
                        <option value="excellent">Отличное</option>
                        <option value="good">Хорошее</option>
                        <option value="average">Среднее</option>
                        <option value="poor">Плохое</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Категория</label>
                    <select id="category_id" name="category_id">
                        <option value="">Без категории</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Фотография * (JPEG/PNG, до 10 МБ, мин. 500×500px)</label>
                    <input type="file" id="photo" name="photo" accept="image/jpeg,image/png" required>
                    <small>Первое фото станет главным</small>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Сохранить</button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">Отмена</button>
                </div>
            </form>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        async function loadCategories() {
            try {
                const categories = await getCategories();
                const select = document.getElementById('category_id');
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Ошибка загрузки категорий:', error);
            }
        }
        
        document.getElementById('badgeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            
            const description = document.getElementById('description').value;
            if (description) formData.append('description', description);
            
            const year = document.getElementById('year').value;
            if (year) formData.append('year', year);
            
            const material = document.getElementById('material').value;
            if (material) formData.append('material', material);
            
            const condition = document.getElementById('condition').value;
            if (condition) formData.append('condition', condition);
            
            const categoryId = document.getElementById('category_id').value;
            if (categoryId) formData.append('category_id', categoryId);
            
            const photoFile = document.getElementById('photo').files[0];
            if (!photoFile) {
                showError('Выберите фотографию');
                return;
            }
            formData.append('photo', photoFile);
            
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            try {
                errorDiv.style.display = 'none';
                const badge = await createBadge(formData);
                successDiv.textContent = '✅ Значок добавлен! Перенаправление...';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = `badge-detail.html?id=${badge.id}`;
                }, 1500);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 5000);
            }
        });
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }
        
        checkAuth().then(loadCategories);
    </script>
</body>
</html>
