<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — Альбом коллекционера</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/collection.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📛 Альбом коллекционера</h1>
            <nav>
                <a href="index.html" class="active">📚 Каталог</a>
                <a href="categories.html">📁 Категории</a>
                <a href="sets.html">📦 Наборы</a>
                <a href="/html/badges/add-badge.html">➕ Добавить значок</a>
                <a href="/html/user/profile.html">👤 Профиль</a>
                <a href="#" id="logoutBtn">🚪 Выйти</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="filters">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию...">
            <select id="categoryFilter">
                <option value="">📂 Все категории</option>
            </select>
            <select id="setFilter">
                <option value="">📦 Все наборы</option>
            </select>
            <div id="tagFilterContainer" style="min-width: 180px;"></div>
            <select id="conditionFilter">
                <option value="">⭐ Все состояния</option>
                <option value="excellent">Отличное</option>
                <option value="good">Хорошее</option>
                <option value="average">Среднее</option>
                <option value="poor">Плохое</option>
            </select>
            <button id="resetFiltersBtn" class="btn-secondary">Сбросить</button>
        </div>

        <div id="badgesGrid" class="badges-grid">
            <div class="loading">Загрузка...</div>
        </div>

        <div id="pagination" class="pagination"></div>
    </main>

    <script src="/js/core/utils.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/core/auth.js"></script>
    <script src="/js/modules/tags.js"></script>
    <script src="/js/pages/index.js"></script>
</body>
</html>
