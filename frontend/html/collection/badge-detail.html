<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Значок — Альбом коллекционера</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/collection.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📛 Альбом коллекционера</h1>
            <nav>
                <a href="index.html">📚 Каталог</a>
                <a href="categories.html">📁 Категории</a>
                <a href="sets.html">📦 Наборы</a>
                <a href="/html/badges/add-badge.html">➕ Добавить значок</a>
                <a href="/html/user/profile.html">👤 Профиль</a>
                <a href="#" id="logoutBtn">🚪 Выйти</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="badgeDetail" class="badge-detail">
            <div class="loading">Загрузка...</div>
        </div>

        <div id="similarBadgesSection" class="similar-section" style="display: none;">
            <h3>🔍 Похожие значки</h3>
            <div id="similarBadgesGrid" class="badges-grid">
                <div class="loading">Поиск похожих...</div>
            </div>
        </div>
    </main>

    <!-- Модальное окно редактора фото -->
    <div id="photoEditorModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <h3>📸 Редактирование фото</h3>
            <div id="editorError" class="error-message" style="display: none;"></div>
            <div id="editorSuccess" class="success-message" style="display: none;"></div>
            
            <div style="text-align: center;">
                <img id="editorPreview" style="max-width: 100%; max-height: 300px; border-radius: 8px; margin: 1rem 0;">
            </div>
            
            <div class="editor-tools" style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 1rem 0;">
                <button id="editorAutoRotate" class="btn-primary btn-small">🔄 Автовыравнивание</button>
                <button id="editorDetectAxis" class="btn-primary btn-small">🎯 Определить ось</button>
                <button id="editorRotateLeft" class="btn-secondary btn-small">↩️ Влево</button>
                <button id="editorRotateRight" class="btn-secondary btn-small">↪️ Вправо</button>
                <button id="editorRemoveBg" class="btn-secondary btn-small">✨ Удалить фон</button>
            </div>
            
            <div class="form-actions">
                <button id="editorSaveBtn" class="btn-primary">💾 Сохранить</button>
                <button id="editorCancelBtn" class="btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <script src="/js/core/utils.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/core/auth.js"></script>
    <script src="/js/modules/photo-editor.js"></script>
    <script src="/js/pages/badge-detail.js"></script>
</body>
</html>
