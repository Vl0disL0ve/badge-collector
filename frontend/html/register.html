<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Альбом коллекционера</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Регистрация</h2>
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            <div id="successMsg" class="success-message" style="display: none;"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Пароль (не менее 8 символов)</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Подтвердите пароль</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>
            <p class="auth-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showError('Пароли не совпадают');
                return;
            }
            
            if (password.length < 8) {
                showError('Пароль должен быть не менее 8 символов');
                return;
            }
            
            try {
                const result = await register(email, password);
                showSuccess('Регистрация успешна! Проверьте email для подтверждения.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                showError(error.message);
            }
        });
        
        function showError(msg) {
            const div = document.getElementById('errorMsg');
            div.textContent = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 5000);
        }
        
        function showSuccess(msg) {
            const div = document.getElementById('successMsg');
            div.textContent = msg;
            div.style.display = 'block';
        }
    </script>
</body>
</html>
